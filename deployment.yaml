apiVersion:  apps/v1
kind: Deployment
metadata:
  name: nginx-devops
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx-devops
  template:
    metadata:
      labels:
        app: nginx-devops
    spec:
      containers:
      - name: nginx
        image: urbinajay/devops-nginx-docker-lab:latest
        ports:
        - containerPort: 80
